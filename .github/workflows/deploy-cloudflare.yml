name: Deploy Tetris to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out into a folder literally named "tetris" so pygbag names the
      # archive tetris.apk (pygbag uses the parent folder name for the bundle).
      - uses: actions/checkout@v4
        with:
          path: tetris

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.6"

      - name: Install deps
        working-directory: tetris
        run: uv sync --group dev

      - name: Build web bundle
        working-directory: tetris
        run: uv run pygbag --build --ume_block 0 --app_name tetris --title "Tetris" main.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tetris/build/web --project-name=tetris-one-thousand --branch=main
