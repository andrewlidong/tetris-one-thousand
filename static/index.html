<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris 1000</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  color: #eee;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
#header {
  display: flex;
  gap: 2rem;
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
  background: #1a1a1a;
  width: 100%;
  justify-content: center;
  z-index: 10;
}
#header span { opacity: 0.7; }
#header strong { color: #0ff; }
#game-area {
  flex: 1;
  display: flex;
  width: 100%;
  overflow: hidden;
  position: relative;
}
#canvas-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
}
canvas {
  background: #000;
  display: block;
}
#sidebar {
  width: 100px;
  background: #1a1a1a;
  padding: 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  border-left: 1px solid #333;
}
#sidebar h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.5;
}
#next-canvas {
  background: #000;
  border: 1px solid #333;
}
#status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.5rem;
  color: #ff0;
  display: none;
  text-align: center;
  z-index: 20;
}
#controls {
  padding: 0.4rem;
  font-size: 0.75rem;
  opacity: 0.4;
  text-align: center;
}
</style>
</head>
<body>

<div id="header">
  <span>Players: <strong id="hud-players">0</strong></span>
  <span>Score: <strong id="hud-score">0</strong></span>
  <span>Lines: <strong id="hud-lines">0</strong></span>
  <span>Board: <strong id="hud-size">0x0</strong></span>
</div>

<div id="game-area">
  <div id="canvas-wrap">
    <canvas id="board"></canvas>
  </div>
  <div id="sidebar">
    <h3>Next</h3>
    <canvas id="next-canvas" width="80" height="64"></canvas>
  </div>
</div>

<div id="status"></div>
<div id="controls">Arrow keys: move &amp; soft drop | Z/X: rotate | Space: hard drop</div>

<script>
const CELL = 16;
const COLORS = [
  null,         // 0 = empty
  '#00f0f0',   // 1 = I (cyan)
  '#f0f000',   // 2 = O (yellow)
  '#a000f0',   // 3 = T (purple)
  '#00f000',   // 4 = S (green)
  '#f00000',   // 5 = Z (red)
  '#0000f0',   // 6 = J (blue)
  '#f0a000',   // 7 = L (orange)
];
const PIECE_COLOR_MAP = { I: 1, O: 2, T: 3, S: 4, Z: 5, J: 6, L: 7 };

// Next piece preview shapes (rotation 0)
const NEXT_SHAPES = {
  I: [[0,0],[0,1],[0,2],[0,3]],
  O: [[0,0],[0,1],[1,0],[1,1]],
  T: [[0,1],[1,0],[1,1],[1,2]],
  S: [[0,1],[0,2],[1,0],[1,1]],
  Z: [[0,0],[0,1],[1,1],[1,2]],
  J: [[0,0],[1,0],[1,1],[1,2]],
  L: [[0,2],[1,0],[1,1],[1,2]],
};

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');
const statusEl = document.getElementById('status');

let myPlayerId = null;
let ws = null;

// Client-side grid state (applied from full state + deltas)
let grid = [];
let boardWidth = 0;
let boardHeight = 0;
let activePieces = {};
let gameOver = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    statusEl.style.display = 'none';
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'welcome') {
      myPlayerId = msg.player_id;
    } else if (msg.type === 'state') {
      // Full state — replace everything
      grid = msg.grid;
      boardWidth = msg.board_width;
      boardHeight = msg.board_height;
      activePieces = msg.active_pieces;
      gameOver = msg.game_over;
      updateHUD(msg);
      render();
      scrollToMyPiece();
    } else if (msg.type === 'delta') {
      applyDelta(msg);
      updateHUD(msg);
      render();
      scrollToMyPiece();
    }
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected. Reconnecting...';
    statusEl.style.display = 'block';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

function applyDelta(msg) {
  // Expand grid if board grew
  if (msg.board_width && msg.board_width > boardWidth) {
    const extra = msg.board_width - boardWidth;
    for (let r = 0; r < grid.length; r++) {
      for (let i = 0; i < extra; i++) grid[r].push(0);
    }
    boardWidth = msg.board_width;
  }
  if (msg.board_height) boardHeight = msg.board_height;

  // Apply cell changes
  if (msg.grid_delta) {
    for (const [r, c, val] of msg.grid_delta) {
      if (r < grid.length && c < grid[0].length) {
        grid[r][c] = val;
      }
    }
  }

  // Initial state ('state') sends a full active_pieces dict; deltas send partials.
  if (msg.active_pieces) {
    activePieces = msg.active_pieces;
  }
  if (msg.pieces_delta) {
    for (const pid in msg.pieces_delta) {
      activePieces[pid] = msg.pieces_delta[pid];
    }
  }
  if (msg.removed_pieces) {
    for (const pid of msg.removed_pieces) {
      delete activePieces[pid];
    }
  }
  gameOver = msg.game_over;
}

function render() {
  if (!grid.length) return;
  const rows = grid.length;
  const cols = grid[0].length;

  canvas.width = cols * CELL;
  canvas.height = rows * CELL;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw locked cells
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] !== 0) {
        drawCell(ctx, r, c, COLORS[grid[r][c]] || '#888');
      }
    }
  }

  // Draw grid lines
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CELL);
    ctx.lineTo(cols * CELL, r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL, 0);
    ctx.lineTo(c * CELL, rows * CELL);
    ctx.stroke();
  }

  // Draw ghost pieces and active pieces
  for (const pid in activePieces) {
    const p = activePieces[pid];
    const colorIdx = PIECE_COLOR_MAP[p.piece_type] || 0;
    const color = COLORS[colorIdx] || '#fff';
    const isMe = pid === myPlayerId;

    // Ghost piece (only for current player, drawn first so real piece overlays)
    if (isMe && p.ghost_cells) {
      for (const cell of p.ghost_cells) {
        drawGhostCell(ctx, cell.row, cell.col, color);
      }
    }

    // Active piece
    for (const cell of p.cells) {
      drawCell(ctx, cell.row, cell.col, color, isMe);
    }
  }

  // Next piece preview
  renderNextPiece();

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
  }
}

function drawCell(context, r, c, color, highlight) {
  const x = c * CELL;
  const y = r * CELL;
  context.fillStyle = color;
  context.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  if (highlight) {
    context.strokeStyle = '#fff';
    context.lineWidth = 2;
    context.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
  }
}

function drawGhostCell(context, r, c, color) {
  const x = c * CELL;
  const y = r * CELL;
  context.strokeStyle = color;
  context.lineWidth = 1;
  context.globalAlpha = 0.3;
  context.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
  context.globalAlpha = 1.0;
}

function renderNextPiece() {
  const myPiece = activePieces[myPlayerId];
  nextCtx.fillStyle = '#000';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

  if (!myPiece || !myPiece.next_piece) return;

  const shape = NEXT_SHAPES[myPiece.next_piece];
  if (!shape) return;

  const colorIdx = PIECE_COLOR_MAP[myPiece.next_piece] || 0;
  const color = COLORS[colorIdx] || '#fff';
  const previewCell = 16;
  // Center the preview
  const offsetX = (nextCanvas.width - 4 * previewCell) / 2;
  const offsetY = (nextCanvas.height - 2 * previewCell) / 2;

  for (const [r, c] of shape) {
    const x = offsetX + c * previewCell;
    const y = offsetY + r * previewCell;
    nextCtx.fillStyle = color;
    nextCtx.fillRect(x + 1, y + 1, previewCell - 2, previewCell - 2);
  }
}

function scrollToMyPiece() {
  const myPiece = activePieces[myPlayerId];
  if (!myPiece || !myPiece.cells.length) return;

  // Find center of my piece
  let sumCol = 0;
  for (const cell of myPiece.cells) sumCol += cell.col;
  const centerCol = sumCol / myPiece.cells.length;
  const targetX = centerCol * CELL - canvasWrap.clientWidth / 2;

  // Smooth scroll horizontally to keep piece visible
  const currentX = canvasWrap.scrollLeft;
  const diff = targetX - currentX;
  // Only scroll if piece is more than 30% off-center
  if (Math.abs(diff) > canvasWrap.clientWidth * 0.3) {
    canvasWrap.scrollLeft = currentX + diff * 0.15;
  }
}

function updateHUD(state) {
  if (state.player_count !== undefined)
    document.getElementById('hud-players').textContent = state.player_count;
  if (state.score !== undefined)
    document.getElementById('hud-score').textContent = state.score;
  if (state.lines_cleared !== undefined)
    document.getElementById('hud-lines').textContent = state.lines_cleared;
  const w = state.board_width || boardWidth;
  const h = state.board_height || boardHeight;
  if (w && h) document.getElementById('hud-size').textContent = `${w}x${h}`;
}

// Keyboard controls
const KEY_MAP = {
  ArrowLeft:  'left',
  ArrowRight: 'right',
  ArrowDown:  'soft_drop',
  ArrowUp:    'rotate_cw',
  KeyZ:       'rotate_ccw',
  KeyX:       'rotate_cw',
  Space:      'hard_drop',
};

document.addEventListener('keydown', (e) => {
  const action = KEY_MAP[e.code];
  if (action && ws && ws.readyState === WebSocket.OPEN) {
    e.preventDefault();
    ws.send(JSON.stringify({ action }));
  }
});

// Start
statusEl.textContent = 'Connecting...';
statusEl.style.display = 'block';
connect();
</script>
</body>
</html>
