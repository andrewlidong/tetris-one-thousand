<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris 1000</title>
<style>
:root {
  --bg: #0a0a14;
  --panel: #12121f;
  --panel-edge: #23233a;
  --text: #d8dce8;
  --dim: #6a7086;
  --accent: #00e5e5;
  --accent-soft: rgba(0, 229, 229, 0.14);
  --gold: #ffc93c;
  --silver: #c0c8d8;
  --bronze: #cd8a54;
  --font: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, 'Courier New', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: radial-gradient(ellipse at 50% -20%, #16182b 0%, var(--bg) 60%);
  color: var(--text);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  height: 100dvh; /* mobile: exclude browser chrome from viewport height */
  overflow: hidden;
  overscroll-behavior: none; /* no pull-to-refresh while playing */
  touch-action: manipulation; /* no double-tap zoom on buttons */
  user-select: none;
  -webkit-user-select: none;
}

/* ── HUD ── */
#header {
  display: flex;
  gap: 1.6rem;
  padding: 0.55rem 1rem;
  font-size: 0.85rem;
  background: rgba(18, 18, 31, 0.9);
  border-bottom: 1px solid var(--panel-edge);
  width: 100%;
  justify-content: center;
  z-index: 10;
}
#header span {
  color: var(--dim);
  text-transform: uppercase;
  font-size: 0.7rem;
  letter-spacing: 1px;
  display: flex;
  align-items: baseline;
  gap: 0.45rem;
}
#header strong {
  color: var(--accent);
  font-size: 1rem;
  text-shadow: 0 0 12px var(--accent-soft);
}

/* ── Board ── */
#game-area {
  flex: 1;
  display: flex;
  width: 100%;
  overflow: hidden;
  position: relative;
}
#canvas-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--panel-edge) transparent;
}
#canvas-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
#canvas-wrap::-webkit-scrollbar-thumb { background: var(--panel-edge); border-radius: 4px; }
canvas { background: #05050c; display: block; }

/* ── Sidebar ── */
#sidebar {
  width: 158px;
  background: var(--panel);
  padding: 0.7rem 0.6rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.45rem;
  border-left: 1px solid var(--panel-edge);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--panel-edge) transparent;
}
#sidebar h3 {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--dim);
  align-self: flex-start;
  padding-left: 2px;
  margin-top: 0.35rem;
}
#sidebar h3:first-child { margin-top: 0; }
#next-canvas, #hold-canvas {
  background: #05050c;
  border: 1px solid var(--panel-edge);
  border-radius: 6px;
}
#leaderboard {
  width: 100%;
  font-size: 0.72rem;
  line-height: 1.9;
}
#leaderboard .row {
  display: flex;
  justify-content: space-between;
  gap: 0.3rem;
  white-space: nowrap;
  overflow: hidden;
  padding: 0 0.35rem;
  border-radius: 4px;
}
#leaderboard .row .lb-name { overflow: hidden; text-overflow: ellipsis; }
#leaderboard .row .lb-score { color: var(--dim); }
#leaderboard .row.rank-1 .lb-name { color: var(--gold); }
#leaderboard .row.rank-2 .lb-name { color: var(--silver); }
#leaderboard .row.rank-3 .lb-name { color: var(--bronze); }
#leaderboard .row.me {
  background: var(--accent-soft);
  outline: 1px solid rgba(0, 229, 229, 0.3);
}
#leaderboard .row.me .lb-name, #leaderboard .row.me .lb-score { color: var(--accent); }

/* ── Status flash ── */
#status {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.6rem;
  font-weight: bold;
  letter-spacing: 3px;
  color: var(--gold);
  display: none;
  text-align: center;
  z-index: 20;
  padding: 0.7rem 1.6rem;
  background: rgba(10, 10, 20, 0.85);
  border: 1px solid rgba(255, 201, 60, 0.35);
  border-radius: 10px;
  text-shadow: 0 0 24px rgba(255, 201, 60, 0.5);
  animation: status-pop 0.25s ease-out;
}
@keyframes status-pop {
  from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

#controls {
  padding: 0.45rem;
  font-size: 0.72rem;
  color: var(--dim);
  text-align: center;
}
#controls b { color: var(--text); font-weight: normal; }

/* ── Touch controls ── */
#touch-controls {
  display: none; /* shown via JS on touch devices */
  width: 100%;
  justify-content: space-between;
  gap: 0.45rem;
  padding: 0.55rem 0.55rem calc(0.55rem + env(safe-area-inset-bottom));
  background: var(--panel);
  border-top: 1px solid var(--panel-edge);
}
#touch-controls .group {
  display: flex;
  gap: 0.45rem;
  flex: 1;
}
#touch-controls button {
  flex: 1;
  min-width: 0; /* let buttons shrink so the bar always fits the screen */
  min-height: 54px;
  font: bold 1.3rem var(--font);
  color: var(--text);
  background: linear-gradient(#232338, #1a1a2c);
  border: 1px solid #34344f;
  border-radius: 10px;
  box-shadow: 0 2px 0 #0a0a14;
  touch-action: none; /* button holds must not scroll the page */
}
#touch-controls button:active {
  background: var(--accent);
  color: #000;
  box-shadow: 0 0 18px var(--accent-soft), 0 2px 0 #0a0a14;
}

@media (max-width: 700px) {
  #header { gap: 0.55rem 0.9rem; font-size: 0.7rem; flex-wrap: wrap; padding: 0.35rem; }
  #header span { font-size: 0.6rem; gap: 0.3rem; }
  #header strong { font-size: 0.85rem; }
  #sidebar { width: 100px; padding: 0.4rem 0.3rem; }
  #controls { display: none; } /* keyboard hints are noise on touch */
}

/* ── Name modal ── */
#name-modal {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(0, 229, 229, 0.06), transparent 55%),
              rgba(6, 6, 12, 0.96);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.1rem;
  z-index: 50;
}
#name-modal h1 {
  font-size: clamp(2rem, 7vw, 3.2rem);
  color: var(--accent);
  letter-spacing: 6px;
  text-shadow: 0 0 18px rgba(0, 229, 229, 0.6), 0 0 55px rgba(0, 229, 229, 0.25);
  animation: title-pulse 2.6s ease-in-out infinite;
}
@keyframes title-pulse {
  0%, 100% { text-shadow: 0 0 18px rgba(0, 229, 229, 0.6), 0 0 55px rgba(0, 229, 229, 0.25); }
  50%      { text-shadow: 0 0 26px rgba(0, 229, 229, 0.9), 0 0 80px rgba(0, 229, 229, 0.4); }
}
#name-input {
  background: rgba(5, 5, 12, 0.9);
  border: 1px solid #2a2a44;
  border-radius: 8px;
  color: var(--text);
  padding: 0.75rem 1rem;
  font: inherit;
  font-size: 1.1rem;
  text-align: center;
  width: min(280px, 78vw);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#name-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 16px var(--accent-soft);
}
#name-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 0.75rem 3rem;
  font: inherit;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 3px;
  transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 0 22px var(--accent-soft);
}
#name-btn:hover { transform: scale(1.05); box-shadow: 0 0 34px rgba(0, 229, 229, 0.4); }
#name-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div id="name-modal">
  <h1>TETRIS 1000</h1>
  <input id="name-input" type="text" maxlength="16" placeholder="Your name" autocomplete="off" spellcheck="false">
  <button id="name-btn">PLAY</button>
</div>

<div id="header">
  <span>Players: <strong id="hud-players">0</strong></span>
  <span>Round: <strong id="hud-round">1</strong></span>
  <span>My Score: <strong id="hud-myscore">0</strong></span>
  <span>Team: <strong id="hud-score">0</strong></span>
  <span>Lines: <strong id="hud-lines">0</strong></span>
  <span>Board: <strong id="hud-size">0x0</strong></span>
</div>

<div id="game-area">
  <div id="canvas-wrap">
    <canvas id="board"></canvas>
  </div>
  <div id="sidebar">
    <h3>Hold</h3>
    <canvas id="hold-canvas" width="80" height="48"></canvas>
    <h3>Next</h3>
    <canvas id="next-canvas" width="80" height="48"></canvas>
    <h3>Top Players</h3>
    <div id="leaderboard"></div>
  </div>
</div>

<div id="status"></div>
<div id="controls"><b>&larr;&rarr;&darr;</b> move &amp; soft drop &nbsp;&middot;&nbsp; <b>Z/X</b> rotate &nbsp;&middot;&nbsp; <b>Space</b> hard drop &nbsp;&middot;&nbsp; <b>C/Shift</b> hold</div>

<div id="touch-controls">
  <div class="group">
    <button data-action="left" aria-label="Move left">&#9664;</button>
    <button data-action="right" aria-label="Move right">&#9654;</button>
  </div>
  <div class="group">
    <button data-action="rotate_ccw" aria-label="Rotate counter-clockwise">&#8634;</button>
    <button data-action="rotate_cw" aria-label="Rotate clockwise">&#8635;</button>
    <button data-action="hold" aria-label="Hold piece">H</button>
  </div>
  <div class="group">
    <button data-action="soft_drop" aria-label="Soft drop">&#9660;</button>
    <button data-action="hard_drop" aria-label="Hard drop">&#10515;</button>
  </div>
</div>

<script>
const CELL = 16;
const COLORS = [
  null,         // 0 = empty
  '#00f0f0',   // 1 = I (cyan)
  '#f0f000',   // 2 = O (yellow)
  '#a000f0',   // 3 = T (purple)
  '#00f000',   // 4 = S (green)
  '#f00000',   // 5 = Z (red)
  '#0000f0',   // 6 = J (blue)
  '#f0a000',   // 7 = L (orange)
];
const PIECE_COLOR_MAP = { I: 1, O: 2, T: 3, S: 4, Z: 5, J: 6, L: 7 };

// Piece preview shapes (rotation 0)
const PREVIEW_SHAPES = {
  I: [[0,0],[0,1],[0,2],[0,3]],
  O: [[0,0],[0,1],[1,0],[1,1]],
  T: [[0,1],[1,0],[1,1],[1,2]],
  S: [[0,1],[0,2],[1,0],[1,1]],
  Z: [[0,0],[0,1],[1,1],[1,2]],
  J: [[0,0],[1,0],[1,1],[1,2]],
  L: [[0,2],[1,0],[1,1],[1,2]],
};

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold-canvas');
const holdCtx = holdCanvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');
const statusEl = document.getElementById('status');
const leaderboardEl = document.getElementById('leaderboard');

let myPlayerId = null;
let myName = '';
let ws = null;

// Client-side grid state (applied from full state + deltas)
let grid = [];
let boardWidth = 0;
let boardHeight = 0;
let activePieces = {};
let statusTimer = null;

function showStatus(text, ms) {
  statusEl.textContent = text;
  statusEl.style.display = 'block';
  clearTimeout(statusTimer);
  if (ms) statusTimer = setTimeout(() => { statusEl.style.display = 'none'; }, ms);
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    statusEl.style.display = 'none';
    if (myName) ws.send(JSON.stringify({ name: myName }));
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'welcome') {
      myPlayerId = msg.player_id;
    } else if (msg.type === 'state') {
      // Full state — replace everything
      grid = msg.grid;
      boardWidth = msg.board_width;
      boardHeight = msg.board_height;
      activePieces = msg.active_pieces;
      updateHUD(msg);
      updateLeaderboard(msg.leaderboard);
      render();
      scrollToMyPiece();
    } else if (msg.type === 'delta') {
      applyDelta(msg);
      updateHUD(msg);
      updateLeaderboard(msg.leaderboard);
      if (msg.round_reset) {
        showStatus(`BOARD FULL — ROUND ${msg.round}`, 2500);
      }
      render();
      scrollToMyPiece();
    }
  };

  ws.onclose = () => {
    showStatus('Disconnected. Reconnecting...');
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

function applyDelta(msg) {
  // Expand grid if board grew
  if (msg.board_width && msg.board_width > boardWidth) {
    const extra = msg.board_width - boardWidth;
    for (let r = 0; r < grid.length; r++) {
      for (let i = 0; i < extra; i++) grid[r].push(0);
    }
    boardWidth = msg.board_width;
  }
  if (msg.board_height) boardHeight = msg.board_height;

  // Apply cell changes
  if (msg.grid_delta) {
    for (const [r, c, val] of msg.grid_delta) {
      if (r < grid.length && c < grid[0].length) {
        grid[r][c] = val;
      }
    }
  }

  activePieces = msg.active_pieces;
}

function render() {
  if (!grid.length) return;
  const rows = grid.length;
  const cols = grid[0].length;

  canvas.width = cols * CELL;
  canvas.height = rows * CELL;

  ctx.fillStyle = '#05050c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines under the cells; a brighter guide every 10 columns helps
  // orientation on a very wide board
  ctx.lineWidth = 1;
  for (let r = 0; r <= rows; r++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.beginPath();
    ctx.moveTo(0, r * CELL + 0.5);
    ctx.lineTo(cols * CELL, r * CELL + 0.5);
    ctx.stroke();
  }
  for (let c = 0; c <= cols; c++) {
    ctx.strokeStyle = c % 10 === 0 ? 'rgba(0,229,229,0.07)' : 'rgba(255,255,255,0.03)';
    ctx.beginPath();
    ctx.moveTo(c * CELL + 0.5, 0);
    ctx.lineTo(c * CELL + 0.5, rows * CELL);
    ctx.stroke();
  }

  // Draw locked cells
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] !== 0) {
        drawCell(ctx, r, c, COLORS[grid[r][c]] || '#888');
      }
    }
  }

  // Draw ghost pieces and active pieces
  for (const pid in activePieces) {
    const p = activePieces[pid];
    const colorIdx = PIECE_COLOR_MAP[p.piece_type] || 0;
    const color = COLORS[colorIdx] || '#fff';
    const isMe = pid === myPlayerId;

    // Ghost piece (only for current player, drawn first so real piece overlays)
    if (isMe && p.ghost_cells) {
      for (const cell of p.ghost_cells) {
        drawGhostCell(ctx, cell.row, cell.col, color);
      }
    }

    // Active piece
    for (const cell of p.cells) {
      drawCell(ctx, cell.row, cell.col, color, isMe);
    }

    // Name tag pill above other players' pieces
    if (!isMe && p.name && p.cells.length) {
      let minRow = Infinity, sumCol = 0;
      for (const cell of p.cells) {
        if (cell.row < minRow) minRow = cell.row;
        sumCol += cell.col;
      }
      const x = (sumCol / p.cells.length + 0.5) * CELL;
      const y = Math.max(minRow * CELL - 6, 9);
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      const w = ctx.measureText(p.name).width + 8;
      ctx.fillStyle = 'rgba(5,5,12,0.75)';
      ctx.beginPath();
      ctx.roundRect(x - w / 2, y - 8, w, 12, 5);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.85;
      ctx.fillText(p.name, x, y + 1);
      ctx.globalAlpha = 1.0;
    }
  }

  // Sidebar previews
  const me = activePieces[myPlayerId];
  renderPreview(nextCtx, nextCanvas, me && me.next_piece);
  renderPreview(holdCtx, holdCanvas, me && me.held_piece);
}

// Lighten (amt > 0) or darken (amt < 0) a #rrggbb color
function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const ch = (v) => Math.max(0, Math.min(255, v + amt));
  const r = ch(n >> 16), g = ch((n >> 8) & 0xff), b = ch(n & 0xff);
  return `rgb(${r},${g},${b})`;
}

function drawCell(context, r, c, color, highlight = false, size = CELL, ox = 0, oy = 0) {
  const x = ox + c * size;
  const y = oy + r * size;

  if (highlight) {
    // Glow only for the player's own 4 cells — shadowBlur is too slow for all
    context.save();
    context.shadowColor = color;
    context.shadowBlur = 10;
  }

  // Beveled block: base fill, light top edge, dark bottom edge
  context.fillStyle = color;
  context.fillRect(x + 1, y + 1, size - 2, size - 2);
  context.fillStyle = shade(color, 70);
  context.fillRect(x + 1, y + 1, size - 2, 2);
  context.fillRect(x + 1, y + 1, 2, size - 2);
  context.fillStyle = shade(color, -70);
  context.fillRect(x + 1, y + size - 3, size - 2, 2);
  context.fillRect(x + size - 3, y + 1, 2, size - 2);

  if (highlight) {
    context.restore();
    context.strokeStyle = 'rgba(255,255,255,0.9)';
    context.lineWidth = 1.5;
    context.strokeRect(x + 1.5, y + 1.5, size - 3, size - 3);
  }
}

function drawGhostCell(context, r, c, color) {
  const x = c * CELL;
  const y = r * CELL;
  context.strokeStyle = color;
  context.lineWidth = 1;
  context.globalAlpha = 0.45;
  context.setLineDash([3, 2]);
  context.strokeRect(x + 2.5, y + 2.5, CELL - 5, CELL - 5);
  context.setLineDash([]);
  context.globalAlpha = 1.0;
}

function renderPreview(context, cv, pieceType) {
  context.fillStyle = '#000';
  context.fillRect(0, 0, cv.width, cv.height);
  if (!pieceType) return;

  const shape = PREVIEW_SHAPES[pieceType];
  if (!shape) return;

  const colorIdx = PIECE_COLOR_MAP[pieceType] || 0;
  const color = COLORS[colorIdx] || '#fff';
  const previewCell = 16;
  // Center on the shape's real bounding box, not a fixed 4x2
  const maxC = Math.max(...shape.map(([, c]) => c));
  const maxR = Math.max(...shape.map(([r]) => r));
  const offsetX = (cv.width - (maxC + 1) * previewCell) / 2;
  const offsetY = (cv.height - (maxR + 1) * previewCell) / 2;

  for (const [r, c] of shape) {
    drawCell(context, r, c, color, false, previewCell, offsetX, offsetY);
  }
}

function updateLeaderboard(board) {
  if (!board) return;
  leaderboardEl.innerHTML = '';
  board.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = `row rank-${i + 1}` + (entry.id === myPlayerId ? ' me' : '');
    const name = document.createElement('span');
    name.className = 'lb-name';
    name.textContent = `${i + 1}. ${entry.name || '???'}`;
    const score = document.createElement('span');
    score.className = 'lb-score';
    score.textContent = entry.score;
    row.append(name, score);
    leaderboardEl.appendChild(row);
  });
}

function scrollToMyPiece() {
  const myPiece = activePieces[myPlayerId];
  if (!myPiece || !myPiece.cells.length) return;

  // Find center of my piece
  let sumCol = 0;
  for (const cell of myPiece.cells) sumCol += cell.col;
  const centerCol = sumCol / myPiece.cells.length;
  const targetX = centerCol * CELL - canvasWrap.clientWidth / 2;

  // Smooth scroll horizontally to keep piece visible
  const currentX = canvasWrap.scrollLeft;
  const diff = targetX - currentX;
  // Only scroll if piece is more than 30% off-center
  if (Math.abs(diff) > canvasWrap.clientWidth * 0.3) {
    canvasWrap.scrollLeft = currentX + diff * 0.15;
  }
}

function updateHUD(state) {
  if (state.player_count !== undefined)
    document.getElementById('hud-players').textContent = state.player_count;
  if (state.round !== undefined)
    document.getElementById('hud-round').textContent = state.round;
  if (state.score !== undefined)
    document.getElementById('hud-score').textContent = state.score;
  if (state.lines_cleared !== undefined)
    document.getElementById('hud-lines').textContent = state.lines_cleared;
  const me = state.active_pieces && state.active_pieces[myPlayerId];
  if (me && me.score !== undefined)
    document.getElementById('hud-myscore').textContent = me.score;
  const w = state.board_width || boardWidth;
  const h = state.board_height || boardHeight;
  if (w && h) document.getElementById('hud-size').textContent = `${w}x${h}`;
}

// ── Keyboard controls with DAS (Delayed Auto Shift) ──────────────────────
// Holding left/right/down repeats the move after a short delay, like real
// Tetris. Rotations, hard drop, and hold fire once per key press.
const KEY_MAP = {
  ArrowLeft:  'left',
  ArrowRight: 'right',
  ArrowDown:  'soft_drop',
  ArrowUp:    'rotate_cw',
  KeyZ:       'rotate_ccw',
  KeyX:       'rotate_cw',
  Space:      'hard_drop',
  KeyC:       'hold',
  ShiftLeft:  'hold',
  ShiftRight: 'hold',
};
const DAS_ACTIONS = new Set(['left', 'right', 'soft_drop']);
const DAS_DELAY = 170;   // ms before auto-repeat kicks in
const DAS_REPEAT = 50;   // ms between repeats
const dasTimers = {};    // action -> {delay, interval}

function sendAction(action) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action }));
  }
}

function stopDas(action) {
  const t = dasTimers[action];
  if (t) {
    clearTimeout(t.delay);
    clearInterval(t.interval);
    delete dasTimers[action];
  }
}

function startDas(action) {
  stopDas(action);
  const t = { delay: null, interval: null };
  t.delay = setTimeout(() => {
    t.interval = setInterval(() => sendAction(action), DAS_REPEAT);
  }, DAS_DELAY);
  dasTimers[action] = t;
}

document.addEventListener('keydown', (e) => {
  const action = KEY_MAP[e.code];
  if (!action) return;
  e.preventDefault();
  if (e.repeat) return;  // we do our own repeat

  sendAction(action);
  if (DAS_ACTIONS.has(action)) startDas(action);
});

document.addEventListener('keyup', (e) => {
  const action = KEY_MAP[e.code];
  if (action) stopDas(action);
});

// Safety: stop all repeats if the tab loses focus mid-keypress
window.addEventListener('blur', () => {
  for (const action of Object.keys(dasTimers)) stopDas(action);
});

// ── Touch controls ────────────────────────────────────────────────────────
// Buttons appear on touch devices. Holding ◀ ▶ ▼ auto-repeats via the same
// DAS timers as the keyboard.
const touchControls = document.getElementById('touch-controls');
const isTouch = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
if (isTouch) touchControls.style.display = 'flex';

for (const btn of touchControls.querySelectorAll('button')) {
  const action = btn.dataset.action;
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    sendAction(action);
    if (DAS_ACTIONS.has(action)) startDas(action);
  });
  for (const evt of ['pointerup', 'pointercancel', 'pointerleave']) {
    btn.addEventListener(evt, () => stopDas(action));
  }
  // Suppress the synthetic click / context menu on long-press
  btn.addEventListener('click', (e) => e.preventDefault());
  btn.addEventListener('contextmenu', (e) => e.preventDefault());
}

// Tapping the board rotates clockwise (a quick tap, not a scroll drag)
let tapStart = null;
canvas.addEventListener('pointerdown', (e) => {
  tapStart = { x: e.clientX, y: e.clientY, t: Date.now() };
});
canvas.addEventListener('pointerup', (e) => {
  if (!tapStart || !isTouch) return;
  const moved = Math.hypot(e.clientX - tapStart.x, e.clientY - tapStart.y);
  if (moved < 10 && Date.now() - tapStart.t < 300) sendAction('rotate_cw');
  tapStart = null;
});

// ── Name entry ────────────────────────────────────────────────────────────
const nameModal = document.getElementById('name-modal');
const nameInput = document.getElementById('name-input');
const nameBtn = document.getElementById('name-btn');

nameInput.value = localStorage.getItem('tetris-name') || '';

function startGame() {
  myName = nameInput.value.trim().slice(0, 16);
  if (myName) localStorage.setItem('tetris-name', myName);
  nameModal.style.display = 'none';
  showStatus('Connecting...');
  connect();
}

nameBtn.addEventListener('click', startGame);
nameInput.addEventListener('keydown', (e) => {
  e.stopPropagation();  // don't trigger game controls while typing
  if (e.key === 'Enter') startGame();
});
nameInput.focus();
</script>
